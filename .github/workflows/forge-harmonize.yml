name: forge-harmonize

on:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC, one hour after forge-watch
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Scan and report what would change, without opening PRs"
        type: boolean
        default: false
      max_prs:
        description: "Maximum PRs to open in this run"
        type: string
        default: "10"

permissions:
  contents: read

concurrency:
  group: forge-harmonize
  cancel-in-progress: false

jobs:
  harmonize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Harmonize eligible repositories
        env:
          GH_TOKEN: ${{ secrets.FORGE_TOKEN }}
        run: |
          ORGS=""
          for o in $(echo "${{ vars.FORGE_ORGS }}" | tr ',' ' '); do ORGS="$ORGS --org $o"; done
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python readme_forge.py --config portfolio.config.json run $ORGS
          else
            python readme_forge.py --config portfolio.config.json harmonize --pr --max-prs "${{ inputs.max_prs || 10 }}" $ORGS
          fi
